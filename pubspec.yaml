name: childsafety
description: Guardian — Child Safety App for Parents
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase & Auth ──────────────────────────────────────────
  firebase_core: ^3.10.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.1

  # ── Maps (NO API KEY NEEDED) ─────────────────────────────────
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^1.3.2

  # ── Location ─────────────────────────────────────────────────
  geolocator: ^10.1.0

  # ── UI & Animation ───────────────────────────────────────────
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  shimmer: ^3.0.0

  # ── State & Utils ────────────────────────────────────────────
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  intl: ^0.19.0
  uuid: ^4.3.3
  timeago: ^3.6.1
  http: ^1.2.0
  url_launcher: ^6.2.4

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true